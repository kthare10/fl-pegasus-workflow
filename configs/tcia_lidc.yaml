{
  "dataset_name": "tcia-lidc-idri",
  "task": "nodule_classification_proxy",
  "data_root": "/path/to/LIDC-IDRI",
  "metadata_files": ["/path/to/tcia_manifest.csv"],
  "sample_id_column": "sample_id",
  "patient_id_column": "patient_id",
  "label_column": "labels",
  "image_path_column": "image_path",
  "stage_input_data": true,
  "allow_synthetic_fallback": false,
  "container_image": "docker://username/fl-medical-imaging:latest",
  "client_partition_strategy": "scanner_or_protocol_proxy",
  "num_clients": 4,
  "samples_per_client": 12,
  "split_seed": 17,
  "train_fraction": 0.7,
  "val_fraction": 0.1,
  "model_name": "linear-smoke",
  "feature_dim": 24,
  "image_size": 96,
  "batch_size": 4,
  "learning_rate": 0.03,
  "rounds": 3,
  "local_epochs": 1,
  "aggregation": "fedavg",
  "request_gpus": 0,
  "positive_terms": ["nodule", "positive", "malignant"],
  "evaluation_metrics": ["auroc", "f1", "client_accuracy"]
}
